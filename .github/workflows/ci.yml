name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # The image is what CI jobs actually consume, so a broken Dockerfile must
  # fail the PR — not the first pipeline that pulls it.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cerberus:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the scanners inside the image
        run: |
          docker run --rm --entrypoint sh cerberus:ci -c \
            'cerberus version && semgrep --version && gitleaks version && trivy --version'
