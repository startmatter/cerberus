# Cerberus — GitLab CI template.
#
# In the repo's .gitlab-ci.yml:
#
#   include:
#     - remote: https://raw.githubusercontent.com/startmatter/cerberus/main/templates/gitlab-ci.yml
#
# Requires two CI variables (set them group-level so every repo inherits):
#   K_SARIF_URL     — the ingest URL from the tracker's integration settings
#   K_SARIF_SECRET  — the secret (mask it)
#
# If the image is private (ghcr packages are private unless the organization
# allows public ones), add a third group variable so the runner can pull it:
#   DOCKER_AUTH_CONFIG (type: File is not needed — plain variable):
#     {"auths":{"ghcr.io":{"auth":"BASE64_OF_username:github_pat_with_read:packages"}}}
#   Build the value with:
#     printf '%s' 'USER:TOKEN' | base64
#
# Pushes to the default branch report (tasks are created/closed); every other
# branch and merge request runs a read-only check that gates the pipeline.
#
# For a nightly dependency sweep, add a scheduled pipeline — new CVEs land in
# unchanged code, so pushes alone never surface them.

.cerberus:
  image:
    name: ghcr.io/startmatter/cerberus:latest
    # The runner starts the job through a shell, so the image's own entrypoint
    # must step aside — otherwise it receives the shell's flags as arguments
    # and the job dies with "Unknown option '-c'".
    entrypoint: [""]
  variables:
    # Full history: changed-file detection diffs against the previous commit.
    GIT_DEPTH: "0"
  script:
    - cerberus scan
  rules:
    - if: $K_SARIF_URL == null || $K_SARIF_SECRET == null
      when: never
    - when: always

cerberus:
  extends: .cerberus
  # `.post` exists in every pipeline, whatever stages the project defines —
  # a hardcoded stage breaks the projects that do not happen to have it.
  stage: .post

# Opt in by defining a scheduled pipeline with SECURITY_NIGHTLY=true.
cerberus:nightly:
  extends: .cerberus
  stage: .post
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SECURITY_NIGHTLY == "true"
