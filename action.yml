name: Cerberus security scan
description: Run Semgrep, Gitleaks and Trivy, report findings to your tracker and gate the merge on new ones.
branding:
  icon: shield
  color: gray-dark

inputs:
  url:
    description: Ingest URL from the tracker's integration settings. Not needed when mode is `off`.
    required: false
    default: ""
  secret:
    description: Ingest secret (store it as a repository or organization secret). Not needed when mode is `off`.
    required: false
    default: ""
  path:
    description: Directory to scan.
    required: false
    default: "."
  mode:
    description: auto | report | check | off. Default auto — report on the default branch, check elsewhere.
    required: false
    default: auto
  image:
    description: Cerberus image to run.
    required: false
    default: ghcr.io/startmatter/cerberus:latest
  registry-token:
    description: >
      Token used to pull the image when it is private (the default GITHUB_TOKEN
      works for images in the same organization; needs the `packages: read`
      permission on the job). Leave empty for a public image.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    # Changed-file detection diffs against the previous commit, so the scan
    # needs more than the default single-commit checkout.
    - name: Deepen history
      shell: bash
      run: git -C "${{ github.workspace }}" fetch --deepen=2 --quiet || true

    # ghcr images are private unless the org allows public packages; an
    # anonymous pull of a private image fails with 403.
    - name: Log in to the registry
      if: inputs.registry-token != ''
      shell: bash
      env:
        REGISTRY_TOKEN: ${{ inputs.registry-token }}
      run: |
        registry="${{ inputs.image }}"
        registry="${registry%%/*}"
        case "$registry" in
          *.*) echo "$REGISTRY_TOKEN" | docker login "$registry" -u "${{ github.actor }}" --password-stdin ;;
          *) echo "cerberus: image has no registry host, skipping login" ;;
        esac

    - name: Run Cerberus
      shell: bash
      env:
        K_SARIF_URL: ${{ inputs.url }}
        K_SARIF_SECRET: ${{ inputs.secret }}
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/src" \
          -w "/src/${{ inputs.path }}" \
          -e K_SARIF_URL -e K_SARIF_SECRET \
          -e GITHUB_ACTIONS -e GITHUB_REPOSITORY -e GITHUB_REF_NAME -e GITHUB_HEAD_REF \
          -e GITHUB_SHA -e GITHUB_ACTOR -e GITHUB_DEFAULT_BRANCH="${{ github.event.repository.default_branch }}" \
          "${{ inputs.image }}" scan --mode "${{ inputs.mode }}"
