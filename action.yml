name: Cerberus security scan
description: Run Semgrep, Gitleaks and Trivy, report findings to your tracker and gate the merge on new ones.
branding:
  icon: shield
  color: gray-dark

inputs:
  url:
    description: Ingest URL from the tracker's integration settings. Not needed when mode is `off`.
    required: false
    default: ""
  secret:
    description: Ingest secret (store it as a repository or organization secret). Not needed when mode is `off`.
    required: false
    default: ""
  path:
    description: Directory to scan.
    required: false
    default: "."
  mode:
    description: auto | report | check | off. Default auto — report on the default branch, check elsewhere.
    required: false
    default: auto
  image:
    description: Cerberus image to run.
    required: false
    default: ghcr.io/startmatter/cerberus:latest
  dns:
    description: >
      DNS servers for the scan container, comma-separated. Needed on self-hosted
      runners whose resolver the container cannot reach — without it Semgrep
      cannot fetch its rules and Trivy cannot fetch its vulnerability database,
      and both quietly produce nothing. Empty uses the host's resolver.
    required: false
    default: ""
  registry-token:
    description: >
      Token used to pull the image when it is private (the default GITHUB_TOKEN
      works for images in the same organization; needs the `packages: read`
      permission on the job). Leave empty for a public image.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    # Changed-file detection diffs against the previous commit, so the scan
    # needs more than the default single-commit checkout.
    - name: Deepen history
      shell: bash
      run: git -C "${{ github.workspace }}" fetch --deepen=2 --quiet || true

    # ghcr images are private unless the org allows public packages; an
    # anonymous pull of a private image fails with 403.
    - name: Log in to the registry
      if: inputs.registry-token != ''
      shell: bash
      env:
        REGISTRY_TOKEN: ${{ inputs.registry-token }}
      run: |
        registry="${{ inputs.image }}"
        registry="${registry%%/*}"
        case "$registry" in
          *.*) echo "$REGISTRY_TOKEN" | docker login "$registry" -u "${{ github.actor }}" --password-stdin ;;
          *) echo "cerberus: image has no registry host, skipping login" ;;
        esac

    - name: Run Cerberus
      shell: bash
      env:
        K_SARIF_URL: ${{ inputs.url }}
        K_SARIF_SECRET: ${{ inputs.secret }}
        # Used to post the scan report on the pull request. Read-only without
        # `pull-requests: write`, in which case the report stays in the summary.
        GITHUB_TOKEN: ${{ inputs.registry-token || github.token }}
      run: |
        dns_args=""
        if [ -n "${{ inputs.dns }}" ]; then
          IFS=',' read -ra servers <<< "${{ inputs.dns }}"
          for s in "${servers[@]}"; do dns_args="$dns_args --dns $(echo "$s" | tr -d ' ')"; done
        fi
        docker run --rm $dns_args \
          -v "${{ github.workspace }}:/src" \
          -v "${GITHUB_STEP_SUMMARY}:/tmp/summary.md" \
          -w "/src/${{ inputs.path }}" \
          -e K_SARIF_URL -e K_SARIF_SECRET \
          -e GITHUB_TOKEN -e GITHUB_API_URL -e GITHUB_REF \
          -e GITHUB_STEP_SUMMARY=/tmp/summary.md \
          -e GITHUB_ACTIONS -e GITHUB_REPOSITORY -e GITHUB_REF_NAME -e GITHUB_HEAD_REF \
          -e GITHUB_SHA -e GITHUB_ACTOR -e GITHUB_DEFAULT_BRANCH="${{ github.event.repository.default_branch }}" \
          "${{ inputs.image }}" scan --mode "${{ inputs.mode }}"

    # The container runs as root over the mounted workspace, so anything a
    # scanner leaves behind is owned by root. The next `actions/checkout` runs
    # as the runner's user, cannot delete those files, and fails the job —
    # every job, not only this one. Hand the workspace back before leaving.
    - name: Restore workspace ownership
      if: always()
      shell: bash
      run: |
        owner=$(stat -c '%u:%g' "${{ github.workspace }}")
        docker run --rm -v "${{ github.workspace }}:/src" \
          --entrypoint chown "${{ inputs.image }}" -R "$owner" /src || true
